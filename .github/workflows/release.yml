name: build & release

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x
      - run: dotnet build OrbSpoofer/OrbSpoofer/OrbSpoofer.csproj -c Release

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x
      - run: dotnet publish OrbSpoofer/OrbSpoofer/OrbSpoofer.csproj -c Release -r win-x64 --self-contained true
      - uses: softprops/action-gh-release@v2
        with:
          files: OrbSpoofer/OrbSpoofer/bin/Release/net10.0-windows/win-x64/publish/OrbSpoofer.exe
          generate_release_notes: true
