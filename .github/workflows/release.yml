name: build & release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    outputs:
      version_changed: ${{ steps.check.outputs.changed }}
      new_version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - id: check
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          try {
            $old = git show HEAD~1:OrbSpoofer/OrbSpoofer.csproj
            $oldVer = [regex]::Match($old, '<Version>(.*?)</Version>').Groups[1].Value
          } catch {
            "changed=false" | Out-File $env:GITHUB_OUTPUT -Append
            exit 0
          }
          $newVer = [regex]::Match(
            (Get-Content OrbSpoofer/OrbSpoofer.csproj -Raw),
            '<Version>(.*?)</Version>'
          ).Groups[1].Value
          if ($oldVer -ne $newVer) {
            "changed=true"  | Out-File $env:GITHUB_OUTPUT -Append
            "version=$newVer" | Out-File $env:GITHUB_OUTPUT -Append
          } else {
            "changed=false" | Out-File $env:GITHUB_OUTPUT -Append
          }

      - run: dotnet build OrbSpoofer.slnx -c Release

      - run: dotnet test OrbSpoofer.slnx -c Release --no-build

  release:
    if: github.event_name == 'push' && needs.build.outputs.version_changed == 'true'
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - run: dotnet publish OrbSpoofer/OrbSpoofer.csproj -c Release -r win-x64 --self-contained true

      - name: Generate release body
        id: body
        shell: pwsh
        run: |
          $parents = (git rev-list --parents HEAD -n1).Trim().Split(' ').Count
          $msg = git show -s --format=%B HEAD
          if ($parents -ge 3) {
            $lines = $msg -split "`n"
            $bodyStart = ($lines | Select-String -Pattern '^\s*$' | Select-Object -First 1).LineNumber + 1
            if ($bodyStart -gt 1) {
              $msg = ($lines[$bodyStart..($lines.Length - 1)] -join "`n").Trim()
            }
          }
          $msg | Out-File -FilePath $env:RUNNER_TEMP/release_body.md -Encoding utf8NoBOM

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build.outputs.new_version }}
          body_path: ${{ runner.temp }}/release_body.md
          files: OrbSpoofer/bin/Release/net10.0-windows/win-x64/publish/OrbSpoofer.exe
